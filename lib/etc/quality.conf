# Quality System Configuration File
# For Vitalia Reborn MUD - Item Quality System
# 
# This file controls the behavior of the item quality system
# ENABLED: 1 to enable, 0 to disable
ENABLED: 1

# Quality chances (must sum to 100 for proper distribution)
# These represent the percentage chance for each quality level
CHANCE_0: 40    # COMUM (Common)
CHANCE_1: 25    # INCOMUM (Uncommon)  
CHANCE_2: 20    # RARO (Rare)
CHANCE_3: 10    # ÉPICO (Epic)
CHANCE_4: 4     # LENDÁRIO (Legendary)
CHANCE_5: 1     # OBRA PRIMA (Masterwork)

# DIVINO (Divine) items can only be created by gods/administrators
# and do not have a random chance