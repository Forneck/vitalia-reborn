# --------------------------------------------------------------------------
# Arquivo de Configuração do Sistema de Qualidade de Itens
# Para Vitalia Reborn MUD
# --------------------------------------------------------------------------
#
# INSTRUÇÕES PARA ADMINISTRADORES:
#
# 1. Este arquivo controla as chances de um item ser gerado com uma
#    qualidade especial (Comum, Incomum, Raro, etc.).
#
# 2. Para que qualquer alteração neste arquivo tenha efeito, o MUD
#    precisa ser reiniciado com o comando 'shutdown'.
#
# 3. As linhas que começam com '#' são comentários e são ignoradas.
#
# 4. A SOMA TOTAL das chances (CHANCE_0 a CHANCE_5) DEVE ser 100.
#    Se a soma for diferente de 100, a distribuição de itens ficará
#    imprevisível.
#
# --------------------------------------------------------------------------

# Ativa ou desativa o sistema de qualidade.
# ENABLED: 1  (para ativar)
# ENABLED: 0  (para desativar)
ENABLED: 1

# --------------------------------------------------------------------------
# Configuração das Chances de Drop (SOMA TOTAL = 100)
# --------------------------------------------------------------------------
#
# CHANCE_0 -> COMUM
# CHANCE_1 -> INCOMUM
# CHANCE_2 -> RARO
# CHANCE_3 -> ÉPICO
# CHANCE_4 -> LENDÁRIO
# CHANCE_5 -> OBRA PRIMA
#
# Exemplo para um evento de Fim de Semana com mais itens Épicos:
# CHANCE_0: 30
# CHANCE_1: 25
# CHANCE_2: 20
# CHANCE_3: 20  <-- Aumentado
# CHANCE_4: 4
# CHANCE_5: 1

# --- VALORES PADRÃO ---
CHANCE_0: 40
CHANCE_1: 25
CHANCE_2: 20
CHANCE_3: 10
CHANCE_4: 4
CHANCE_5: 1

# --------------------------------------------------------------------------
# Nota sobre a Qualidade DIVINA:
#
# A qualidade DIVINA não pode ser obtida aleatoriamente. Ela só pode ser
# aplicada a um item por um Deus usando o comando 'qadmin setdivine'.
# Por isso, não há uma chance (CHANCE_6) para ela neste arquivo.
# --------------------------------------------------------------------------
